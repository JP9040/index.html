<!doctype html>
<html lang="en">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<head>
<title>WATCH</title>
<style>
.container{
border-style: 1px solid rgb(255, 255, 255);
border-radius: 50%;
justify-content: centre;
display: flex;
height: 500px;
width: 500px;
box-shadow: -5px 5px 5px white;
position: relative;
background-image: transparent;
backdrop-filter: blur(10px);
margin-left: 35px;
margin-top: 80px;

 
}
.clock{
display: flex;
height: 500px
}
body{
background-image: url(IMAGE/6150433.jpg);
height: 100vh;
align-content: center;
justify-items: center
}
.clock span{
position: absolute;
transform: rotate(calc(30deg * var(--i)));
inset: 12px;
text-align: -webkit-center;
}
.clock span b{
transform: rotate(calc(-30deg * var(--i)));
display: inline-block;
font-size: 30px;
color:white;
}
.hand{
position: absolute;
top: 50%;
left: 50%;
bottom: translateX(-50px);

}
.hand i {
 background-color: var(--clr);
    width: 5px;
    height: 95px;
    border-radius: 30px;
    border: 1px solid white;
    display: inherit;
    margin-top: 50px;
}
 

@media (max-width: 768px) {
        .container {
            width: 85vmin;
            height: 85vmin;
        }
        
        .clock span {
            inset: 4%;
        }
        
        .clock span b {
            font-size: clamp(16px, 3.5vmin, 25px);
        }
    }
    
    @media (max-width: 480px) {
        .container {
            width: 80vmin;
            height: 80vmin;
        }
        
        .clock span b {
            font-size: clamp(14px, 3vmin, 20px);
        }
    }
    
    @media (max-width: 320px) {
        .container {
            width: 75vmin;
            height: 75vmin;
        }
    }
</style>
</head>
<body>
<div class="clock">
<div class="container">

<span id='hour' style="--clr:red" class="hand"><i></i></span>
<span id='min' style="--clr:green " class="hand"><i></i></span>
<span id='sec' style="--clr:white" class="hand"><i></i></span>

<span style="--i:1"><b>1</b></span>
<span style="--i:2"><b>2</b></span>
<span style="--i:3"><b>3</b></span>
<span style="--i:4"><b>4</b></span>
<span style="--i:5"><b>5</b></span>
<span style="--i:6"><b>6</b></span>
<span style="--i:7"><b>7</b></span>
<span style="--i:8"><b>8</b></span>
<span style="--i:9"><b>9</b></span>
<span style="--i:10"><b>10</b></span>
<span style="--i:11"><b>11</b></span>
<span style="--i:12"><b>12</b></span>

</div>

</div>

<script>
let hr = document.getElementById('hour');
let min = document.getElementById('min');
let sec = document.getElementById('sec');

function displayTime(){
let date = new Date().toLocaleString("en-US", { timeZone: "Asia/Kolkata" });
date = new Date(date);

let hh = date.getHours();
let mm = date.getMinutes();
let ss = date.getSeconds();

    if (hh > 12) hh -= 12;

let hRotation = 30*hh + mm/2;
let mRotation = 6*mm;
let sRotation = 6*ss;

hr.style.transform = `rotate(${hRotation}deg)`;
min.style.transform = `rotate(${mRotation}deg)`;
sec.style.transform = `rotate(${sRotation}deg)`;

}
setInterval(displayTime, 1000);
displayTime();


</script>



</body>
</html>
